# Visit https://goreleaser.com for documentation on how to customize this
# behavior.
version: 2
before:
  hooks:
    # this is just an example and not a requirement for provider building/publishing
    - go mod tidy
builds:
- env:
    # goreleaser does not work with CGO, it could also complicate
    # usage by users in CI/CD systems like HCP Terraform where
    # they are unable to install libraries.
    - CGO_ENABLED=0
  mod_timestamp: '{{ .CommitTimestamp }}'
  flags:
    - -trimpath
  ldflags:
    - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
  goos:
    - freebsd
    - windows
    - linux
    - darwin
  goarch:
    - amd64
    - '386'
    - arm
    - arm64
  ignore:
    - goos: darwin
      goarch: '386'
    - goos: windows
      goarch: arm
  binary: '{{ .ProjectName }}_v{{ .Version }}'
archives:
- formats:
  - zip
  name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256
  # GPG signing of the checksum file is intentionally disabled: this fork's
  # releases are consumed by the homelab (sashkolo/homelab) via a filesystem
  # mirror that pins the SHA256SUMS digest and verifies every zip against an
  # entry in that file (see utilities/omada/omadactl). That digest pin is the
  # trust root for the homelab, so a detached GPG signature adds no security and
  # would require a GPG private key secret that the fork does not configure. If
  # upstreaming or publishing to a public registry, re-enable signing.
  # signs:
  #   - artifacts: checksum
  #     args:
  #       - "--batch"
  #       - "--local-user"
  #       - "{{ .Env.GPG_FINGERPRINT }}"
  #       - "--output"
  #       - "${signature}"
  #       - "--detach-sign"
  #       - "${artifact}"
release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  # If you want to manually examine the release before its live, uncomment this line:
  # draft: true
changelog:
  disable: true
